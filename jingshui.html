<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>静水 · 大衣 — KIDNESS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=LXGW+WenKai&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    background: #0d0d0b; color: #c4c0b4;
    font-family: 'LXGW WenKai', 'Noto Serif SC', serif;
    font-weight: 300; line-height: 1.8;
    letter-spacing: 0.02em; overflow-x: hidden;
  }
  /* NAV */
  nav {
    position: fixed; top:0; left:0; right:0; z-index:52;
    padding: 1.25rem 2rem; display: flex; justify-content: space-between;
    align-items: center; background: rgba(13,13,11,0.4); backdrop-filter: blur(20px);
  }
  .nav-logo { font-family: 'Inter',sans-serif; font-size:0.55rem; letter-spacing:0.3em; text-transform:uppercase; color:#c4c0b4; text-decoration:none; font-weight:300; }
  .nav-back { font-size:0.65rem; color:#6b6760; text-decoration:none; letter-spacing:0.2em; }
  .nav-back:hover { color:#c4c0b4; }
  /* HERO */
  .hero { height:70vh; position:relative; overflow:hidden; }
  .hero img { width:100%; height:100%; object-fit:cover; filter:brightness(0.9); }
  .hero-title {
    position:absolute; bottom:3rem; left:2rem; z-index:2;
  }
  .hero-title h1 { font-size:clamp(2rem,8vw,4rem); font-weight:200; letter-spacing:0.15em; }
  .hero-title p { font-size:0.7rem; color:#8a867e; letter-spacing:0.2em; margin-top:0.5rem; }
  /* SECTION */
  .section { max-width:720px; margin:0 auto; padding:4rem 2rem; }
  .section h3 {
    font-family:'Inter',sans-serif; font-size:0.5rem; letter-spacing:0.3em;
    color:#55524c; text-transform:uppercase; margin-bottom:1.5rem; font-weight:300;
  }
  .section p { margin-bottom:1.2rem; font-size:0.82rem; color:#8a867e; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-top:2rem; }
  .detail-item { border-top:0.5px solid #1a1816; padding-top:1rem; }
  .detail-label { font-family:'Inter',sans-serif; font-size:0.4rem; letter-spacing:0.25em; color:#3a3835; text-transform:uppercase; margin-bottom:0.4rem; }
  .detail-value { font-size:0.75rem; color:#8a867e; }
  /* GALLERY */
  .gallery { display:flex; gap:1px; margin-top:2rem; flex-wrap:wrap; }
  .gallery img { width:calc(50% - 0.5px); object-fit:cover; }
  .gallery img.full { width:100%; }
  /* COMMENTS */
  .comments-section { max-width:720px; margin:2rem auto; padding:2rem; }
  .comment-item {
    padding: 1.2rem 0; border-bottom: 0.5px solid #1a1816;
  }
  .comment-meta {
    font-family: 'Inter', Arial, sans-serif; font-size: 0.4rem;
    letter-spacing: 0.2em; color: #3a3835; margin-bottom: 0.4rem;
  }
  .comment-meta strong { color: #6b6760; font-weight: 350; }
  .comment-body { font-size: 0.72rem; line-height: 1.8; color: #8a867e; }
  .comment-form { margin-top:2rem; }
  .comment-form textarea {
    width:100%; background:#0d0d0b; border:0.5px solid #2a2825; color:#c4c0b4;
    padding:0.8rem; font-family:inherit; font-size:0.72rem; resize:vertical;
    min-height:80px; outline:none;
  }
  .comment-form textarea:focus { border-color:#8a867e; }
  .comment-form button {
    margin-top:0.8rem; background:none; border:0.5px solid #2a2825;
    color:#c4c0b4; padding:0.5rem 1.5rem; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:0.45rem; letter-spacing:0.2em;
    text-transform:uppercase; transition:all 0.3s;
  }
  .comment-form button:hover { border-color:#8a867e; }
  .comment-err { color:#c4a0a0; font-size:0.65rem; margin-top:0.5rem; min-height:1rem; }
  .toast {
    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); z-index:200;
    background:#1e1c1a; border:0.5px solid #2a2825; color:#c4c0b4;
    padding:0.6rem 1.5rem; font-size:0.65rem; letter-spacing:0.05em;
    opacity:0; transition:opacity 0.3s; pointer-events:none;
  }
  .toast.show { opacity:1; }
  /* FOOTER */
  footer { text-align:center; padding:4rem 2rem; color:#3a3835; font-size:0.55rem; }
  footer a { color:#6b6760; text-decoration:none; }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-back">← KIDNESS</a>
  <a href="index.html" class="nav-logo">KIDNESS</a>
  <span></span>
</nav>

<div class="hero">
  <img src="kidness_images/01_jingshui_coat.png" alt="静水大衣">
  <div class="hero-title">
    <h1>静水</h1>
    <p>STILL WATER · 大衣</p>
  </div>
</div>

<section class="section">
  <h3>设计理念</h3>
  <p>静水大衣的灵感来源于深水之下的静默力量。表面不张扬，内里却承载着结构性的思考。克制、从容，不追逐潮流，只为穿者提供一件能与时间共处的衣物。</p>
  <p>廓形借鉴古典男装剪裁，以现代手法重新演绎。宽松但不松垮，硬朗但不僵硬。每一处缝线都在诉说着"少即是多"——不是简陋的少，而是恰到好处的收敛。</p>
</section>

<section class="section">
  <h3>细节</h3>
  <div class="detail-grid">
    <div class="detail-item"><div class="detail-label">面料</div><div class="detail-value">羊毛混纺斜纹</div></div>
    <div class="detail-item"><div class="detail-label">颜色</div><div class="detail-value">炭灰 / 墨黑</div></div>
    <div class="detail-item"><div class="detail-label">尺码</div><div class="detail-value">S / M / L</div></div>
    <div class="detail-item"><div class="detail-label">纽扣</div><div class="detail-value">古铜做旧</div></div>
  </div>
  <div class="gallery">
    <img src="kidness_images/01_jingshui_01_front.png" alt="正面">
    <img src="kidness_images/01_jingshui_03_back.png" alt="背面">
    <img src="kidness_images/01_jingshui_04_sideopen.png" alt="侧开">
    <img src="kidness_images/01_jingshui_05_flat.png" alt="平铺">
    <img class="full" src="kidness_images/01_jingshui_06_detail_placket.png" alt="门襟细节">
    <img class="full" src="kidness_images/01_jingshui_07_detail_cuff.png" alt="袖口细节">
  </div>
</section>

<section class="comments-section">
  <h3>评价 · 静水大衣</h3>
  <div id="commentList"></div>
  <div class="comment-form">
    <textarea id="commentInput" placeholder="说说你对静水大衣的看法……"></textarea>
    <div class="comment-err" id="commentErr"></div>
    <button id="commentSubmit">提交评价</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<footer>
  <p><a href="index.html">KIDNESS</a> · 轻，还是重</p>
</footer>

<script>
(async function() {
  'use strict';
  var API = '/api';
  var PRODUCT = 'jingshui';

  async function apiCall(path, data) {
    var resp = await fetch(API + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    var json = await resp.json();
    if (!resp.ok) throw new Error(json.error || '请求失败');
    return json;
  }

  // Load comments
  async function loadComments() {
    try {
      var resp = await fetch(API + '/comments?product=' + PRODUCT);
      var result = await resp.json();
      renderComments(result.items || []);
    } catch(e) { document.getElementById('commentList').innerHTML = '<p style="color:#55524c;font-size:0.72rem;">还没有评价，来做第一个。</p>'; }
  }

  function renderComments(items) {
    var list = document.getElementById('commentList');
    if (!items.length) {
      list.innerHTML = '<p style="color:#55524c;font-size:0.72rem;">还没有评价，来做第一个。</p>';
      return;
    }
    var html = '';
    items.forEach(function(c) {
      var d = new Date(c.createdAt * 1000);
      var ts = d.getFullYear() + '.' + (d.getMonth()+1) + '.' + d.getDate();
      html += '<div class="comment-item">'
        + '<div class="comment-meta"><strong>' + esc(c.name || '匿名') + '</strong> &nbsp;' + ts + '</div>'
        + '<div class="comment-body">' + esc(c.text) + '</div>'
        + '</div>';
    });
    list.innerHTML = html;
  }

  function esc(s) { var d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }

  // Submit
  document.getElementById('commentSubmit').addEventListener('click', async function() {
    var text = document.getElementById('commentInput').value.trim();
    var err = document.getElementById('commentErr');
    if (!text) { err.textContent = '写点什么吧'; return; }
    err.textContent = '';
    var btn = this; btn.disabled = true; btn.textContent = '提交中…';
    try {
      await apiCall('/comments/add', { product: PRODUCT, name: '匿名', text: text });
      document.getElementById('commentInput').value = '';
      toast('评价发布成功');
      loadComments();
    } catch(e) {
      err.textContent = '发布失败：' + (e.message || '请稍后再试');
    }
    btn.disabled = false; btn.textContent = '提交评价';
  });

  // Toast
  var toastTimer;
  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
  }

  loadComments();
})();
</script>
<!-- 统计 -->
</body>
</html>
